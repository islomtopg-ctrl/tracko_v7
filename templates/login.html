<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracko — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--accent:#4F46E5;--text:#1D1D1F;--text2:#4B5563;--bg:#F9FAFB;--surface:#fff;--border:rgba(0,0,0,0.08);--red:#EF4444;--sans:'Inter',system-ui,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#0B0F19;--surface:#1E293B;--text:#F8FAFC;--text2:#94A3B8;--border:rgba(255,255,255,0.05);--accent:#6366F1;}}
[data-theme="dark"]{:root{--bg:#0B0F19;--surface:#1E293B;--text:#F8FAFC;--text2:#94A3B8;--border:rgba(255,255,255,0.05);--accent:#6366F1;}}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.08);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none;}
.logo-text{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.4px;}
h1{font-size:22px;font-weight:600;letter-spacing:-.4px;margin-bottom:6px;color:var(--text);}
.sub{font-size:14px;color:var(--text2);margin-bottom:28px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .15s,box-shadow .15s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1);}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:980px;padding:12px;font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:all .18s;margin-top:6px;}
.btn:hover{filter:brightness(1.08);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.error{background:rgba(255,149,0,.08);border:.5px solid rgba(255,149,0,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}
.error.show{display:block;}
.hint{font-size:12px;color:var(--text2);text-align:center;margin-top:16px;line-height:1.5;}
.hint code{font-family:ui-monospace,monospace;background:var(--bg);padding:1px 5px;border-radius:4px;font-size:11px;}
</style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tracko">
</head>
<body>
<div class="card">
  <div class="logo" style="margin-bottom: 48px; justify-content: center; flex-direction: column; gap: 20px;">
    <div style="width: 100px; height: 100px; background: #fff; border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
      <img src="/static/logo2.png" alt="Tracko Logo" style="width: 82%; height: 82%; object-fit: cover; border-radius: 16px;">
    </div>
    <div style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px; color: var(--text);">Tracko</div>
  </div>


  <h1>Welcome back</h1>
  <p class="sub">Premium Inventory Ecosystem</p>
  <div class="error" id="err"></div>
  <form onsubmit="doLogin(); return false;">
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="admin@tracko.uz" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button class="btn" id="btn" type="submit">Войти</button>
  </form>
  <p class="hint">Первый вход: <code>admin@tracko.uz</code> / <code>admin123</code></p>
</div>
<script>
document.getElementById('pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('pass').focus(); });

async function doLogin(){
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pass').value;
  if(!email || !password){ showErr('Введи email и пароль'); return; }
  btn.disabled = true; btn.textContent = 'Вхожу…';
  err.classList.remove('show');
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const d = await r.json();
    if(d.ok){
      if(d.force_password_change) {
        window.location = '/profile?must_change=1';
      } else {
        window.location = '/dashboard';
      }
    }
    else { showErr(d.error || 'Ошибка входа'); }
  } catch(e) { showErr('Ошибка соединения'); }
  btn.disabled = false; btn.textContent = 'Войти';
}
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.classList.add('show'); }
</script>
</body>
</html>
