<!DOCTYPE html>
<html lang="ru" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tracko — Ремонты</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);--text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;--accent:#007AFF;--green:#34c759;--amber:#ff9f0a;--red:#ff3b30;--r:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--sans:'Inter',system-ui,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--text2:#98989d;--text3:#48484a;}}
[data-theme="dark"]{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--text2:#98989d;--text3:#48484a;}
[data-theme="light"]{--bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);--text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;--accent:#007AFF;}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;height:56px;background:rgba(242,242,247,.88);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
[data-theme="dark"] .nav,@media(prefers-color-scheme:dark){.nav{background:rgba(0,0,0,.8);}}
[data-theme="dark"] .nav{background:rgba(0,0,0,.8);}
.nav-left{display:flex;align-items:center;gap:12px;}
.back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:4px;}
.nav-title{font-size:16px;font-weight:600;}
.nav-right{display:flex;align-items:center;gap:8px;}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:980px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surface);color:var(--text2);border:.5px solid var(--border2);box-shadow:var(--shadow);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.content{max-width:960px;margin:0 auto;padding:24px 20px 60px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--surface);border:.5px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);}
.kpi-n{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
.kpi-l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.fb{padding:6px 14px;border-radius:980px;background:var(--surface);border:.5px solid var(--border2);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s;box-shadow:var(--shadow);}
.fb.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.list{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;padding:16px 18px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,122,255,.1);transform:translateY(-1px);}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.inv-tag{font-family:ui-monospace,monospace;font-size:11px;font-weight:600;color:var(--accent);background:rgba(0,122,255,.1);padding:3px 8px;border-radius:6px;}
.card-title{font-size:14px;font-weight:600;flex:1;}
.card-meta{font-size:12px;color:var(--text2);margin-bottom:6px;}
.card-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px;}
.card-foot{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;}
.b-pending{background:rgba(255,149,0,.12);color:#FF9500;}
.b-progress{background:rgba(0,122,255,.12);color:var(--accent);}
.b-done{background:rgba(52,199,89,.12);color:#34c759;}
.b-canc{background:var(--surface2);color:var(--text3);}
.b-low{background:rgba(52,199,89,.08);color:#34c759;}
.b-med{background:rgba(255,149,0,.08);color:#ff9f0a;}
.b-high{background:rgba(255,59,48,.08);color:#ff3b30;}
.b-crit{background:rgba(255,59,48,.15);color:#ff3b30;font-weight:800;}
.empty{text-align:center;padding:56px 20px;color:var(--text2);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-txt{font-size:15px;font-weight:500;}
/* Overlay / Sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;}}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0;animation:slideUp .3s cubic-bezier(.32,0,.67,0);}
@media(min-width:600px){.sheet{border-radius:20px;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 20px 0;}
.sheet-title{font-size:17px;font-weight:700;}
.sheet-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.sheet-x{background:var(--surface2);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;}
.sheet-body{padding:16px 20px;}
.sheet-foot{padding:0 20px 20px;display:flex;gap:10px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
.field select,.field textarea{width:100%;background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border .15s;}
.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:none;height:80px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:980px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:#ff3b30;color:#fff;}
</style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tracko">
</head>
<body data-theme="{{ request.cookies.get('theme','') }}">
<nav class="nav">
  <div class="nav-left">
    <a href="/" class="back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Главная
    </a>
    <span class="nav-title">Ремонты</span>
  </div>
  <div class="nav-right">
    {% if role_info.get('can_export') %}
    <a href="/api/export/maintenance" class="btn btn-ghost btn-sm">↓ Excel</a>
    {% endif %}
  </div>
</nav>
<div class="content">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-n" id="cn-p" style="color:#FF9500;">—</div><div class="kpi-l">Ожидают</div></div>
    <div class="kpi"><div class="kpi-n" id="cn-i" style="color:var(--accent);">—</div><div class="kpi-l">В работе</div></div>
    <div class="kpi"><div class="kpi-n" id="cn-d" style="color:#34c759;">—</div><div class="kpi-l">Завершено</div></div>
    <div class="kpi"><div class="kpi-n" id="cn-c" style="color:#ff3b30;">—</div><div class="kpi-l">Критично</div></div>
  </div>
  <div class="filters">
    <button class="fb on" onclick="flt('',this)">Все</button>
    <button class="fb" onclick="flt('pending',this)">⏳ Ожидают</button>
    <button class="fb" onclick="flt('in_progress',this)">🔧 В работе</button>
    <button class="fb" onclick="flt('completed',this)">✅ Завершено</button>
    <button class="fb" onclick="flt('crit',this)">🔴 Критично</button>
  </div>
  <div class="list" id="list"><div class="empty"><div class="empty-icon">🔧</div><div class="empty-txt">Загрузка…</div></div></div>
</div>

<div class="overlay" id="m">
  <div class="sheet">
    <div class="sheet-head">
      <div><div class="sheet-title" id="m-title">Обновить статус</div><div class="sheet-sub" id="m-sub"></div></div>
      <button class="sheet-x" onclick="close_m()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="sheet-body">
      <div class="field"><label>Новый статус</label>
        <select id="m-st">
          <option value="in_progress">🔧 Взять в работу</option>
          <option value="completed">✅ Завершить</option>
          <option value="cancelled">Отменить</option>
        </select>
      </div>
      <div class="field"><label>Решение / комментарий</label>
        <textarea id="m-nt" placeholder="Что сделано, что заменено…"></textarea>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" style="flex:1" onclick="close_m()">Отмена</button>
      <button class="btn btn-primary" style="flex:1" onclick="do_resolve()">Сохранить</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const MR="{{user.role}}";
const PL={low:'🟢 Низкий',medium:'🟡 Средний',high:'🟠 Высокий',critical:'🔴 Критический'};
const PC={low:'b-low',medium:'b-med',high:'b-high',critical:'b-crit'};
const SL={pending:'⏳ Ожидает',in_progress:'🔧 В работе',completed:'✅ Завершено',cancelled:'Отменено'};
const SC={pending:'b-pending',in_progress:'b-progress',completed:'b-done',cancelled:'b-canc'};
let all=[],cur=null;
function ts(s){if(!s)return'—';const d=new Date((s.includes('T')?s:s.replace(' ','T'))+'Z');return d.toLocaleString('ru',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
async function load(){
  const r=await fetch('/api/maintenance').then(r=>r.json()).catch(()=>[]);
  all=Array.isArray(r)?r:[];
  document.getElementById('cn-p').textContent=all.filter(x=>x.status==='pending').length;
  document.getElementById('cn-i').textContent=all.filter(x=>x.status==='in_progress').length;
  document.getElementById('cn-d').textContent=all.filter(x=>x.status==='completed').length;
  document.getElementById('cn-c').textContent=all.filter(x=>x.priority==='critical').length;
  render(all);
}
function flt(v,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  render(v==='crit'?all.filter(x=>x.priority==='critical'):v?all.filter(x=>x.status===v):all);
}
function render(rows){
  const el=document.getElementById('list');
  if(!rows.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div class="empty-txt">Нет заявок</div></div>';return;}
  const canAct=['superadmin','aho'].includes(MR);
  el.innerHTML=rows.map(r=>`<div class="card" ${canAct&&r.status!=='completed'?`onclick="open_m(${r.id},'${(r.inv_num||'').replace(/'/g,'')}','${(r.category||'').replace(/'/g,'')}')"`:'style="cursor:default;"'}>
    <div class="card-top">
      ${r.inv_num?`<span class="inv-tag">${r.inv_num}</span>`:''}
      <span class="card-title">${r.category||''} ${r.model?'· '+r.model:''}</span>
      <span class="badge ${SC[r.status]||'b-canc'}">${SL[r.status]||r.status}</span>
    </div>
    <div class="card-meta">📍 ${r.room||'—'} · ${r.reported_by_name||'—'} · ${ts(r.created_at)}</div>
    ${r.description?`<div class="card-desc">${r.description.slice(0,180)}</div>`:''}
    <div class="card-foot">
      <span class="badge ${PC[r.priority]||'b-med'}">${PL[r.priority]||r.priority}</span>
      ${r.resolved_at?`<span style="font-size:11px;color:var(--text3);">Решено: ${ts(r.resolved_at)}</span>`:''}
    </div>
  </div>`).join('');
}
function open_m(id,inv,cat){
  cur=id;
  document.getElementById('m-title').textContent=`${inv||cat} — обновить`;
  document.getElementById('m-sub').textContent=cat;
  document.getElementById('m-nt').value='';
  document.getElementById('m').classList.add('open');
}
function close_m(){document.getElementById('m').classList.remove('open');}
document.getElementById('m').addEventListener('click',e=>{if(e.target===document.getElementById('m'))close_m();});
async function do_resolve(){
  const st=document.getElementById('m-st').value;
  const nt=document.getElementById('m-nt').value.trim();
  const r=await fetch(`/api/maintenance/${cur}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st,resolution:nt})});
  const d=await r.json();
  if(d.ok){toast('Обновлено ✓');close_m();load();}else toast(d.error||'Ошибка','err');
}
function toast(m,t='ok'){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(t==='err'?' err':'');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);}
load();
</script>
</body></html>
