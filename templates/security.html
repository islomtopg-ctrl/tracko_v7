<!DOCTYPE html>
<html lang="ru" data-theme="">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tracko — Безопасность</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);--text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;--accent:#007AFF;--green:#34c759;--red:#ff3b30;--r:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--sans:'Inter',system-ui,sans-serif;}
[data-theme="dark"]{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--text2:#98989d;--text3:#48484a;}
html{-webkit-font-smoothing:antialiased;}body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;height:56px;background:rgba(242,242,247,.88);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
[data-theme="dark"] .nav{background:rgba(0,0,0,.8);}
.nav-left{display:flex;align-items:center;gap:12px;}.back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:4px;}.nav-title{font-size:16px;font-weight:600;}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:980px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost{background:var(--surface);color:var(--text2);border:.5px solid var(--border2);box-shadow:var(--shadow);}.btn-ghost:hover{background:var(--surface2);}
.content{max-width:1000px;margin:0 auto;padding:24px 20px 60px;}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:9px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .15s;width:260px;}
.search:focus{border-color:var(--accent);}
select.filt{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;cursor:pointer;}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:.5px solid var(--border);}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:var(--surface2);}
td{padding:11px 16px;font-size:13px;vertical-align:middle;}
.ok-b{background:rgba(52,199,89,.12);color:#34c759;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;}
.fail-b{background:rgba(255,59,48,.12);color:#ff3b30;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;}
.ip{font-family:ui-monospace,monospace;font-size:12px;color:var(--text2);}
.ts{font-size:12px;color:var(--text3);}
.pagination{display:flex;gap:6px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.page-btn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.page-btn:hover,.page-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow);}
.stat-n{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat-l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
</style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tracko">
</head>
<body data-theme="{{ request.cookies.get('theme','') }}">
<nav class="nav">
  <div class="nav-left"><a href="/" class="back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>Главная</a><span class="nav-title">Журнал безопасности</span></div>
</nav>
<div class="content">
  <div class="stat-row">
    <div class="stat"><div class="stat-n" id="st-total">{{ logs|length }}</div><div class="stat-l">Всего записей</div></div>
    <div class="stat"><div class="stat-n" id="st-ok" style="color:#34c759;">—</div><div class="stat-l">Успешных входов</div></div>
    <div class="stat"><div class="stat-n" id="st-fail" style="color:#ff3b30;">—</div><div class="stat-l">Неудачных попыток</div></div>
  </div>
  <div class="toolbar">
    <input class="search" id="q" placeholder="IP, email, имя…" oninput="filter()">
    <select class="filt" id="sf" onchange="filter()">
      <option value="">Все</option>
      <option value="ok">Успешные</option>
      <option value="fail">Неудачные</option>
    </select>
  </div>
  <div class="card">
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Пользователь</th><th>Email</th><th>Статус</th><th>IP-адрес</th><th>Время</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="pagination" id="pager"></div>
</div>
<script>
const ALL = {{ logs | tojson }};
let filtered=[...ALL], page=0;
const PER=30;
document.getElementById('st-ok').textContent=ALL.filter(r=>r.success).length;
document.getElementById('st-fail').textContent=ALL.filter(r=>!r.success).length;
function ts(s){if(!s)return'—';const d=new Date((s.includes('T')?s:s.replace(' ','T'))+'Z');return d.toLocaleString('ru',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function filter(){
  const q=document.getElementById('q').value.toLowerCase(),sf=document.getElementById('sf').value;
  filtered=ALL.filter(r=>{
    const txt=[r.email||'',r.name||'',r.ip||''].join(' ').toLowerCase();
    const sm=!sf||(sf==='ok'?r.success:!r.success);
    return txt.includes(q)&&sm;
  });
  page=0;render();
}
function render(){
  const slice=filtered.slice(page*PER,(page+1)*PER);
  document.getElementById('tbody').innerHTML=slice.map(r=>`<tr>
    <td style="font-weight:500;">${r.name||'—'}</td>
    <td style="color:var(--text2);">${r.email||'—'}</td>
    <td>${r.success?'<span class="ok-b">✓ Успех</span>':'<span class="fail-b">✗ Отказ</span>'}</td>
    <td class="ip">${r.ip||'—'}</td>
    <td class="ts">${ts(r.ts)}</td>
  </tr>`).join('');
  const pages=Math.ceil(filtered.length/PER);
  document.getElementById('pager').innerHTML=pages<=1?'':Array.from({length:pages},(_,i)=>`<button class="page-btn${i===page?' on':''}" onclick="goPage(${i})">${i+1}</button>`).join('');
}
function goPage(n){page=n;render();window.scrollTo(0,0);}
render();
</script>
</body></html>
