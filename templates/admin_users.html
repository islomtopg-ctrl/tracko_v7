<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracko — Пользователи</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);--text:#1c1c1e;--text2:#6c6c70;--text3:#aeaeb2;--accent:#4361EE;--green:#34c759;--red:#FF453A;--r:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--sans:'Inter',system-ui,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#f5f5f7;--text2:#98989d;--text3:#48484a;--accent:#6c7ff5;}}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);}
.nav{position:sticky;top:0;z-index:100;height:56px;background:rgba(242,242,247,.85);backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
@media(prefers-color-scheme:dark){.nav{background:rgba(0,0,0,.8);}}
.nav-left{display:flex;align-items:center;gap:14px;}
.back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:5px;}
.nav-title{font-size:16px;font-weight:600;color:var(--text);}
.content{max-width:900px;margin:0 auto;padding:24px 20px;}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 16px;border-radius:980px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--surface);color:var(--text2);border:.5px solid var(--border2);box-shadow:var(--shadow);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-danger{background:rgba(255,59,48,.1);color:var(--red);}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
.card-head{padding:16px 20px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:15px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:.5px solid var(--border);background:var(--surface);}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:12px 16px;font-size:13px;vertical-align:middle;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;}
.user-cell{display:flex;align-items:center;gap:10px;}
.user-info .name{font-weight:500;}
.user-info .email{font-size:12px;color:var(--text2);}
.role-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:980px;}
.inactive{opacity:.45;}
.overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4); z-index: 3000;
  -webkit-backdrop-filter: blur(8px) saturate(180%);
  backdrop-filter: blur(8px) saturate(180%);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s var(--ease-out);
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet{background:var(--surface);width:100%;max-width:680px;border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;transform:translateY(30px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.overlay.open .sheet{transform:translateY(0);}
.handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:10px auto 0;display:block;}

@media (min-width: 641px) {
  .overlay {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 40px !important;
    background: rgba(0,0,0,0.55) !important;
    backdrop-filter: blur(14px) saturate(180%) !important;
    -webkit-backdrop-filter: blur(14px) saturate(180%) !important;
  }
  .sheet, #modal .sheet {
    border-radius: 28px !important;
    max-height: 90vh;
    width: 100%;
    max-width: 680px !important;
    padding: 0 !important;
    transform: scale(0.95) translateY(10px) !important;
    opacity: 0 !important;
    transition: transform .4s var(--ease-spring), opacity .2s ease !important;
    box-shadow: 0 30px 90px rgba(0,0,0,0.4) !important;
    display: flex !important;
    flex-direction: column !important;
    overflow: hidden !important;
    pointer-events: none;
  }
  .overlay.open .sheet, #modal.open .sheet {
    opacity: 1 !important;
    transform: scale(1) translateY(0) !important;
    pointer-events: all;
  }
  .sheet-head, #modal .sheet-head { 
    padding: 32px 40px 16px 40px !important; 
    border-bottom: 2px solid var(--border); 
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
    margin-bottom: 0 !important;
  }
  .sheet-title, #modal .sheet-title { font-size: 26px !important; font-weight: 800 !important; }
  .sheet-body, #modal .sheet-body { 
    padding: 32px 40px !important; 
    flex: 1; overflow-y: auto;
  }
  .sheet-foot, #modal .sheet-foot { 
    padding: 20px 40px 32px 40px !important; 
    border-top: 2px solid var(--border); 
    background: var(--surface);
    position: sticky; bottom: 0; z-index: 10;
    margin-top: 0 !important;
  }
  .handle { display: none !important; }
  .fg { gap: 24px !important; }
  .field input, .field select { padding: 12px 16px !important; font-size: 16px !important; border-radius: 12px !important; }
}
.sheet-head{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-size:17px;font-weight:600;}
.sheet-x{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:18px 22px;}
.sheet-foot{padding:0 22px 22px;display:flex;gap:8px;justify-content:flex-end;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{grid-column:1/-1;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);margin-bottom:5px;}
.field input,.field select{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .15s;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);z-index:999;background:rgba(28,28,30,.95);color:#fff;backdrop-filter:blur(16px);border-radius:980px;padding:10px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok .ti{color:#34c759;}
.toast.err .ti{color:#ff3b30;}
</style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tracko">
</head>
<body>
<nav class="nav">
  <div class="nav-left">
    <a href="/dashboard" class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg> Главная</a>
    <span class="nav-title">Пользователи</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn btn-ghost btn-sm" onclick="window.location='/admin/dismissals'" title="Увольнения">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="18" x2="17" y2="18"/></svg>
      Увольнения
    </button>
    <button class="btn btn-primary" onclick="openAdd()">+ Добавить</button>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" title="Выйти" style="padding:8px 12px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<div class="content">
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
    <input id="q" type="text" placeholder="Поиск по имени или email..." oninput="filterUsers()" style="flex:1;min-width:200px;background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:9px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;">
    <select id="role-filter" onchange="filterUsers()" style="background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;cursor:pointer;">
      <option value="">Все роли</option>
      {% for rkey, rval in roles.items() %}
      <option value="{{ rkey }}">{{ rval.label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">Все пользователи <span id="count" style="font-size:13px;font-weight:400;color:var(--text2);"></span></div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Пользователь</th><th>Роль</th><th>Отдел</th><th>Статус</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="sheet">
    <span class="handle"></span>
    <form onsubmit="save(); return false;" style="display:contents;">
      <div class="sheet-head">
        <div class="sheet-title" id="modal-title">Добавить пользователя</div>
        <button class="sheet-x" type="button" onclick="closeModal()">✕</button>
      </div>
      <div class="sheet-body">
      <input type="hidden" id="uid">
      <div class="fg">
        <div class="field"><label>Имя *</label><input id="f-name" placeholder="Иван Иванов"></div>
        <div class="field"><label>Email *</label><input id="f-email" type="email" placeholder="ivan@company.uz"></div>
        <div class="field"><label>Пароль</label><input id="f-pass" type="password" placeholder="Мин. 6 символов"></div>
        <div class="field"><label>Отдел</label><input id="f-dept" placeholder="АХО, IT, HR…"></div>
        <div class="field ff"><label>Роль</label>
          <select id="f-role">
            {% for rkey, rval in roles.items() %}
            <option value="{{rkey}}">{{rval.label}}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
      <div class="sheet-foot">
        <button class="btn btn-sm" id="btn-add-item" type="button" onclick="window.location='/?add_emp=' + encodeURIComponent(document.getElementById('f-name').value)" style="display:none;background:rgba(67,97,238,.1);color:var(--accent);border:none;cursor:pointer;margin-right:auto;">
          + Предмет
        </button>
        <button class="btn btn-danger btn-sm" id="btn-del" type="button" onclick="deactivate()" style="display:none">Деактивировать</button>
        <button class="btn btn-sm" id="btn-dismiss" type="button" onclick="initiateDismissal()" style="display:none;background:rgba(255,59,48,.08);color:#FF453A;border:none;cursor:pointer;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="18" x2="17" y2="18"/></svg>
          Уволить
        </button>
        <button class="btn btn-ghost" type="button" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" type="submit">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"><span class="ti" id="ti">●</span><span id="tm"></span></div>

<script>
const ROLES = {{ roles|tojson }};
const ROLE_COLORS = {
  superadmin: '#F2F2FE,#5856D6',
  aho: '#E5F1FF,#007AFF',
  hr: '#E8F7ED,#34C759',
  employee: '#F2F2F7,#8E8E93',
  auditor: '#E5FAFF,#5AC8FA',
  deputy: '#FFF4E5,#FF9500',
  director: '#FFECEB,#FF3B30',
  accountant: '#E5F7F9,#30B0C7',
  viewer: '#E5FAFF,#5AC8FA'
};

let users = [], editId = null;

function filterUsers(){
  const q = document.getElementById('q').value.toLowerCase();
  const role = document.getElementById('role-filter').value;
  const tbody = document.getElementById('tbody');
  const filtered = users.filter(u=>{
    const match = (u.name+u.email).toLowerCase().includes(q);
    const roleMatch = !role || u.role === role;
    return match && roleMatch;
  });
  document.getElementById('count').textContent = `(${filtered.length})`;
  tbody.innerHTML = filtered.map(u => {
    const [bg,clr] = (ROLE_COLORS[u.role]||'#F1EFE8,#5F5E5A').split(',');
    const avatarColor = ['#4361EE','#7B2FBE','#06D6A0','#FF9F0A','#5856D6'][u.id%5];
    const initial = (u.name && u.name.length > 0) ? u.name[0].toUpperCase() : '?';
    return `<tr class="${u.active?'':'inactive'}" style="cursor:pointer" onclick="openEdit(${u.id})">
      <td><div class="user-cell">
        <div class="avatar" style="background:${avatarColor}">${initial}</div>
        <div class="user-info"><div class="name">${u.name || '—'}</div><div class="email">${u.email || '—'}</div></div>
      </div></td>
      <td><span class="role-badge" style="background:${bg};color:${clr}">${ROLES[u.role]?.label||u.role}</span></td>
      <td style="color:var(--text2)">${u.department||'—'}</td>
      <td><span class="role-badge" style="background:${u.active?'rgba(52,199,89,.1)':'rgba(110,110,115,.1)'};color:${u.active?'#34c759':'#98989d'}">${u.active?'Активен':'Неактивен'}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEdit(${u.id})">&#9998;</button></td>
    </tr>`;
  }).join('');
}

async function load(){
  try {
    const resp = await fetch('/api/users');
    if (!resp.ok) throw new Error('Failed to fetch users');
    users = await resp.json();
    filterUsers();
  } catch(e) {
    console.error(e);
    document.getElementById('tbody').innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--red)">Ошибка загрузки пользователей. Убедитесь, что у вас есть права администратора.</td></tr>`;
  }
}

function openAdd(){
  editId=null;
  document.getElementById('modal-title').textContent='Добавить пользователя';
  document.getElementById('uid').value='';
  ['f-name','f-email','f-pass','f-dept'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-role').value='employee';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('modal').classList.add('open');
}

function openEdit(id){
  const u=users.find(x=>x.id===id); if(!u) return;
  editId=id;
  document.getElementById('modal-title').textContent='Редактировать';
  document.getElementById('uid').value=u.id;
  document.getElementById('f-name').value=u.name;
  document.getElementById('f-email').value=u.email;
  document.getElementById('f-pass').value='';
  document.getElementById('f-dept').value=u.department||'';
  document.getElementById('f-role').value=u.role;
  document.getElementById('btn-del').style.display=u.active?'inline-flex':'none';
  document.getElementById('btn-del').textContent=u.active?'Деактивировать':'Активировать';
  document.getElementById('btn-add-item').style.display=u.active?'inline-flex':'none';
  // Show dismiss button only for active employees (not superadmin)
  const dismBtn = document.getElementById('btn-dismiss');
  dismBtn.style.display = (u.active && u.role !== 'superadmin') ? 'inline-flex' : 'none';
  document.getElementById('modal').classList.add('open');
}

async function save(){
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const pass=document.getElementById('f-pass').value;
  const role=document.getElementById('f-role').value;
  const dept=document.getElementById('f-dept').value.trim();
  if(!name||!email){toast('Заполни имя и email','err');return;}
  const payload={name,email,role,department:dept};
  if(pass) payload.password=pass;
  let url='/api/users', method='POST';
  if(editId){ url=`/api/users/${editId}`; method='PUT'; }
  else if(!pass){toast('Введи пароль для нового пользователя','err');return;}
  
  try {
    const resp = await fetch(url,{
      method,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const r = await resp.json();
    if(r.ok){
      closeModal();
      toast(editId?'Сохранено':'Пользователь создан','ok');
      load();
    } else {
      toast(r.error||'Ошибка сервера','err');
    }
  } catch(e) {
    toast('Ошибка сети или сервера','err');
  }
}

async function deactivate(){
  const u=users.find(x=>x.id===editId); if(!u) return;
  const newActive=!u.active;
  if(u.active && !confirm('Деактивировать пользователя?')) return;
  const r=await(await fetch(`/api/users/${editId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({active:newActive})})).json();
  if(r.ok){closeModal();toast(newActive?'Активирован':'Деактивирован','ok');load();}
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

async function doLogout(){
  await fetch('/api/auth/logout',{method:'POST'});
  window.location='/login';
}

async function initiateDismissal(){
  const id = editId;
  const u = users.find(x=>x.id===id);
  if(!u) return;
  const notes = prompt(`Запустить процесс увольнения для ${u.name}?\n\nПричина (необязательно):`);
  if(notes === null) return; // user cancelled
  const r = await (await fetch('/api/dismissals',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({employee_id:id, notes})
  })).json();
  if(r.ok){
    closeModal();
    const goPage = confirm(`Процесс увольнения запущен!\nСкопировать ссылку для сотрудника?`);
    if(goPage){
      navigator.clipboard.writeText(location.origin+'/dismissal/'+r.dismissal_id);
      alert('Ссылка скопирована в буфер обмена');
    }
    toast('Процесс увольнения запущен','ok');
    window.location='/admin/dismissals';
  } else {
    if(r.id) {
      const go = confirm(r.error + '\nОткрыть страницу увольнений?');
      if(go) window.location='/admin/dismissals';
    } else toast(r.error||'Ошибка','err');
  }
}

let _t; function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  document.getElementById('tm').textContent=msg;
  el.className='toast '+type+' show';
  clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('show'),3000);
}

load();
</script>
</body>
</html>
